name: Verify CAP Checksum & Structure

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, ready_for_review]
    paths:
      - '**/*.zip'

jobs:
  verify-zips:
    runs-on: ubuntu-latest
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Step 1 - Verify sha256 in manifest.json for changed ZIPs
        shell: bash
        run: |
          set -euo pipefail
          source ".github/scripts/root-manifest-utils.sh"
          manifest_path="commerce-apps-manifest/manifest.json"
          validate_manifest "$manifest_path"

          # Collect changed ZIPs into a file that the next step can reuse
          : > changed_zips.txt

          while IFS= read -r -d '' f; do
            [[ "$f" == *.zip ]] && printf '%s\n' "$f" >> changed_zips.txt
          done < <(git diff --name-only -z "$BASE_SHA" "$HEAD_SHA")

          if [[ ! -s changed_zips.txt ]]; then
            echo "No .zip files changed in this PR. Nothing to verify."
            exit 0
          fi

          echo "Changed ZIP files:"
          sed 's/^/ - /' changed_zips.txt

          while IFS= read -r zip_path; do
            # If deleted in PR head, skip 
            if [[ ! -f "$zip_path" ]]; then
              echo "Skipping (not present in PR head): $zip_path"
              continue
            fi

            zip_file="$(basename "$zip_path")"
            entry="$(get_manifest_entry_for_zip "$zip_file" "$manifest_path")"

            # Compute checksum of the ZIP
            computed="$(sha256sum "$zip_path" | awk '{print $1}' | tr '[:upper:]' '[:lower:]')"

            # Read sha256 from manifest entry
            manifest_sha="$(jq -r '.sha256 // empty' <<< "$entry" | tr '[:upper:]' '[:lower:]')"

            if [[ -z "$manifest_sha" || "$manifest_sha" == "null" ]]; then
              echo "::error file=$manifest_path::Missing or empty \"sha256\" for ZIP $zip_file"
              exit 1
            fi

            echo "ZIP:      $zip_path"
            echo "Computed: $computed"
            echo "Manifest: $manifest_sha"

            if [[ "$computed" != "$manifest_sha" ]]; then
              echo "::error file=$manifest_path::sha256 mismatch for $zip_path (computed=$computed, manifest=$manifest_sha)"
              exit 1
            fi
          done < changed_zips.txt

      - name: Step 2 - Verify manifest zip name matches + version is new vs catalog.json
        shell: bash
        run: |
          set -euo pipefail
          source ".github/scripts/root-manifest-utils.sh"
          manifest_path="commerce-apps-manifest/manifest.json"
          validate_manifest "$manifest_path"

          [[ -s changed_zips.txt ]] || exit 0

          while IFS= read -r zip_path; do
            [[ -f "$zip_path" ]] || continue

            dir="$(dirname "$zip_path")"
            catalog_path="$dir/catalog.json"

            if [[ ! -f "$catalog_path" ]]; then
              echo "::error file=$catalog_path::catalog.json not found next to ZIP ($zip_path)"
              exit 1
            fi

            zip_file="$(basename "$zip_path")"
            entry="$(get_manifest_entry_for_zip "$zip_file" "$manifest_path")"
            manifest_zip="$(jq -r '.zip // empty' <<< "$entry")"
            if [[ -z "$manifest_zip" || "$manifest_zip" == "null" ]]; then
              echo "::error file=$manifest_path::Missing \"zip\" for ZIP $zip_file"
              exit 1
            fi

            version="$(jq -r '.version // empty' <<< "$entry")"
            if [[ -z "$version" || "$version" == "null" ]]; then
              echo "::error file=$manifest_path::Missing \"version\" for ZIP $zip_file"
              exit 1
            fi

            # Verify new version in manifest is unique
            if jq -e --arg v "$version" '.versions[]? | select(.version == $v)' "$catalog_path" >/dev/null; then
              echo "::error file=$catalog_path::Version $version already exists in catalog.json"
              exit 1
            fi
          done < changed_zips.txt

      - name: Step 3 - Unzip and verify CAP folder structure
        shell: bash
        run: |
          set -euo pipefail

          # List of allowed top level folder names
          allowed=("impex" "app-configuration" "storefront-next" "cartridges" "icons")

          [[ -s changed_zips.txt ]] || exit 0

          while IFS= read -r zip_path; do
            [[ -f "$zip_path" ]] || continue

            # Unzip file to temp dir
            tmpdir="$(mktemp -d)"
            unzip -q "$zip_path" -d "$tmpdir"

            # Root should be exactly one directory (the wrapper folder)
            mapfile -t roots < <(find "$tmpdir" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | grep -v '^__MACOSX$' | sort -u)
            if [[ ${#roots[@]} -ne 1 ]]; then
              echo "::error file=$zip_path::Expected exactly 1 root directory after unzip, found ${#roots[@]}: ${roots[*]}"
              rm -rf "$tmpdir"
              exit 1
            fi
            root="$tmpdir/${roots[0]}"

            # Check immediate child directories of root are allowed
            mapfile -t children < <(find "$root" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | grep -v '^__MACOSX$' | sort -u)
            for c in "${children[@]}"; do
              ok=false
              for a in "${allowed[@]}"; do
                [[ "$c" == "$a" ]] && ok=true && break
              done
              if [[ "$ok" == "false" ]]; then
                echo "::error file=$zip_path::Disallowed directory under root: \"$c\". Allowed: ${allowed[*]}"
                rm -rf "$tmpdir"
                exit 1
              fi
            done

            # Ensure app-configuration/tasksList.json exists in the ZIP payload
            required_task_list="$root/app-configuration/tasksList.json"
            if [[ ! -f "$required_task_list" ]]; then
              echo "::error file=$zip_path::Missing required file app-configuration/tasksList.json"
              rm -rf "$tmpdir"
              exit 1
            fi

            # See .github/scripts/validate-tasks-list.sh for schema.
            if ! tasks_output="$(bash ".github/scripts/validate-tasks-list.sh" "$required_task_list" 2>&1)"; then
              echo "::error file=$zip_path::app-configuration/tasksList.json validation failed:"
              printf '%s\n' "$tasks_output"
              rm -rf "$tmpdir"
              exit 1
            fi
            echo "  ✓ $tasks_output"

            # Validate optional app-configuration/adminComponents.json.
            # See .github/scripts/validate-admin-components.sh for schema.
            admin_components="$root/app-configuration/adminComponents.json"
            if [[ -f "$admin_components" ]]; then
              if ! admin_output="$(bash ".github/scripts/validate-admin-components.sh" "$admin_components" 2>&1)"; then
                echo "::error file=$zip_path::app-configuration/adminComponents.json validation failed:"
                printf '%s\n' "$admin_output"
                rm -rf "$tmpdir"
                exit 1
              fi
              echo "  ✓ $admin_output"
            fi

            rm -rf "$tmpdir"
          done < changed_zips.txt

      - name: Step 5 - [Tax] Verify hooks exist and scripts resolve
        shell: bash
        run: |
          set -euo pipefail

          # Required hook suffixes — every tax app must implement these
          required_suffixes=(calculate commit cancel)

          # Optional hook suffixes — allowed for any domain but not required
          optional_suffixes=(checkConnectionHealth)

          [[ -s changed_zips.txt ]] || exit 0

          is_tax_app=false

          while IFS= read -r zip_path; do
            [[ -f "$zip_path" ]] || continue

            # Only run for ZIPs under tax/ at repo root
            case "$zip_path" in
              tax/*) is_tax_app=true ;;
              *) continue ;;
            esac

            # Derive domain from the directory (e.g. tax/avalara-tax/... → tax)
            domain="$(echo "$zip_path" | cut -d'/' -f1)"

            # Build required and optional hook arrays for this domain
            required_hooks=()
            for suffix in "${required_suffixes[@]}"; do
              required_hooks+=("sfcc.app.${domain}.${suffix}")
            done

            optional_hooks=()
            for suffix in "${optional_suffixes[@]}"; do
              optional_hooks+=("sfcc.app.${domain}.${suffix}")
            done

            tmpdir="$(mktemp -d)"
            trap 'rm -rf "$tmpdir"' RETURN

            unzip -q "$zip_path" -d "$tmpdir"

            # Find cartridges/site_cartridges anywhere under the unzip root
            base="$(find "$tmpdir" -type d -path '*/cartridges/site_cartridges' -print -quit)"
            if [[ -z "$base" || ! -d "$base" ]]; then
              echo "::error file=$zip_path::Missing directory cartridges/site_cartridges in ZIP"
              exit 1
            fi

            hooks_file="$(find "$base" -type f -name hooks.json -print -quit)"
            if [[ -z "$hooks_file" ]]; then
              echo "::error file=$zip_path::hooks.json not found under cartridges/site_cartridges"
              exit 1
            fi

            hooks_dir="$(dirname "$hooks_file")"
            echo "ZIP: $zip_path"
            echo "hooks.json: $hooks_file"

            # Ensure there are no hooks outside the required + optional sets
            allowed_hooks=("${required_hooks[@]}" "${optional_hooks[@]}")
            while IFS= read -r name; do
              ok=false
              for hook in "${allowed_hooks[@]}"; do
                [[ "$name" == "$hook" ]] && ok=true && break
              done
              if [[ "$ok" == "false" ]]; then
                echo "::error file=$hooks_file::Disallowed hook \"$name\". Only allowed: ${allowed_hooks[*]}"
                exit 1
              fi
            done < <(jq -r '.hooks[]?.name // empty' "$hooks_file")

            # Validate required hooks are present, and each has a script that exists
            for hook in "${required_hooks[@]}"; do
              script="$(jq -r --arg name "$hook" '.hooks[]? | select(.name == $name) | .script // empty' "$hooks_file" | head -n 1)"

              if [[ -z "$script" || "$script" == "null" ]]; then
                echo "::error file=$hooks_file::Missing hook or script for \"$hook\""
                exit 1
              fi

              # script is relative to hooks.json location (strip leading ./)
              rel="${script#./}"
              target="$hooks_dir/$rel"

              if [[ ! -f "$target" ]]; then
                echo "::error file=$hooks_file::Script for \"$hook\" points to missing file: $script (resolved: $target)"
                exit 1
              fi
            done

            # Validate optional hooks — if present, their scripts must resolve
            for hook in "${optional_hooks[@]}"; do
              script="$(jq -r --arg name "$hook" '.hooks[]? | select(.name == $name) | .script // empty' "$hooks_file" | head -n 1)"

              if [[ -z "$script" || "$script" == "null" ]]; then
                continue
              fi

              rel="${script#./}"
              target="$hooks_dir/$rel"

              if [[ ! -f "$target" ]]; then
                echo "::error file=$hooks_file::Script for optional hook \"$hook\" points to missing file: $script (resolved: $target)"
                exit 1
              fi
            done

            echo "SUCCESS - required ${domain} hooks and scripts verified for $zip_path"

            rm -rf "$tmpdir"
            trap - RETURN
          done < changed_zips.txt

          if [[ "$is_tax_app" == "false" ]]; then
            echo "No changed tax apps. Skipping Step 5."
          fi

      - name: Step 6 - Validate icon uniqueness
        shell: bash
        run: |
          set -euo pipefail

          [[ -s changed_zips.txt ]] || exit 0

          icons_manifest_dir="commerce-apps-manifest/icons"

          while IFS= read -r zip_path; do
            [[ -f "$zip_path" ]] || continue

            # Extract ISV name from path: {domain}/{isv-name}/
            isv_name="$(echo "$zip_path" | cut -d'/' -f2)"
            if [[ -z "$isv_name" ]]; then
              echo "::error file=$zip_path::Could not determine ISV name from path"
              exit 1
            fi

            tmpdir="$(mktemp -d)"
            trap 'rm -rf "$tmpdir"' RETURN

            unzip -q "$zip_path" -d "$tmpdir"

            # Find icons directory in the extracted CAP
            icons_dir="$(find "$tmpdir" -type d -name icons -print -quit)"

            if [[ -z "$icons_dir" || ! -d "$icons_dir" ]]; then
              echo "No icons directory found in $zip_path - skipping icon validation"
              rm -rf "$tmpdir"
              trap - RETURN
              continue
            fi

            echo "ZIP: $zip_path"
            echo "ISV: $isv_name"
            echo "Icons dir: $icons_dir"

            # Find all icon files (png, svg, jpg, jpeg)
            mapfile -t icon_files < <(find "$icons_dir" -type f \( -iname "*.png" -o -iname "*.svg" -o -iname "*.jpg" -o -iname "*.jpeg" \) -print)

            if [[ ${#icon_files[@]} -eq 0 ]]; then
              echo "No icon files found in $icons_dir - skipping"
              rm -rf "$tmpdir"
              trap - RETURN
              continue
            fi

            echo "Found ${#icon_files[@]} icon file(s)"

            # Check each icon for uniqueness
            for icon_file in "${icon_files[@]}"; do
              icon_name="$(basename "$icon_file")"
              icon_ext="${icon_name##*.}"

              # Expected name in manifest: {isv-name}.{ext}
              expected_name="${isv_name}.${icon_ext}"

              echo "Checking icon: $icon_name"

              # Compute hash of the new icon
              new_hash="$(sha256sum "$icon_file" | awk '{print $1}')"
              echo "  Hash: $new_hash"

              # Check if an icon with this ISV name already exists
              existing_icon="$icons_manifest_dir/$expected_name"

              if [[ -f "$existing_icon" ]]; then
                existing_hash="$(sha256sum "$existing_icon" | awk '{print $1}')"
                echo "  Existing icon found: $existing_icon"
                echo "  Existing hash: $existing_hash"

                if [[ "$new_hash" != "$existing_hash" ]]; then
                  echo "::warning file=$zip_path::Icon change detected for ISV '$isv_name'. The icon in your CAP (hash: $new_hash) differs from the existing icon in commerce-apps-manifest/icons/ (hash: $existing_hash). If this is a rebranding effort, this is expected. Otherwise, ensure you're using the correct icon file. This will overwrite the existing icon on merge."
                  echo "  ⚠️  Icon will be updated on merge"
                else
                  echo "  ✓ Icon hash matches existing - OK"
                fi
              else
                echo "  ✓ No existing icon for ISV '$isv_name' - will be added on merge"
              fi

              # Verify icon is named correctly (should be {isv-name}.{ext})
              if [[ "$icon_name" != "$expected_name" ]]; then
                echo "::warning file=$zip_path::Icon should be named '$expected_name' but is named '$icon_name'. Icon will be renamed to '$expected_name' when extracted."
              fi
            done

            echo "SUCCESS - Icon validation passed for $zip_path"

            rm -rf "$tmpdir"
            trap - RETURN
          done < changed_zips.txt

      - name: Step 7 - Security & quality scan
        shell: bash
        run: |
          set -euo pipefail

          [[ -s changed_zips.txt ]] || exit 0

          while IFS= read -r zip_path; do
            [[ -f "$zip_path" ]] || continue

            tmpdir="$(mktemp -d)"
            trap 'rm -rf "$tmpdir"' RETURN

            unzip -q "$zip_path" -d "$tmpdir"

            # Find the single root directory
            mapfile -t roots < <(find "$tmpdir" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | grep -v '^__MACOSX$' | sort -u)
            if [[ ${#roots[@]} -ne 1 ]]; then
              echo "::error file=$zip_path::Cannot determine CAP root for security scan"
              rm -rf "$tmpdir"
              exit 1
            fi
            cap_root="$tmpdir/${roots[0]}"

            echo "Running security & quality scan on $zip_path ..."
            bash ".github/scripts/security-scan.sh" "$cap_root"

            rm -rf "$tmpdir"
            trap - RETURN
          done < changed_zips.txt

      - name: Step 8 - Validate storefrontSupport fields in manifest
        shell: bash
        run: |
          set -euo pipefail
          source ".github/scripts/root-manifest-utils.sh"
          manifest_path="commerce-apps-manifest/manifest.json"

          [[ -s changed_zips.txt ]] || exit 0

          while IFS= read -r zip_path; do
            [[ -f "$zip_path" ]] || continue

            zip_file="$(basename "$zip_path")"
            entry="$(get_manifest_entry_for_zip "$zip_file" "$manifest_path")"

            tmpdir="$(mktemp -d)"
            unzip -q "$zip_path" -d "$tmpdir"
            commerce_app="$(find "$tmpdir" -name 'commerce-app.json' -print -quit)"

            manifest_has="$(jq -r 'has("storefrontSupport")' <<< "$entry")"
            cap_has="false"
            if [[ -n "$commerce_app" && -f "$commerce_app" ]]; then
              cap_has="$(jq -r 'has("storefrontSupport")' "$commerce_app")"
            fi

            # Both absent: no gating declared, nothing to validate.
            if [[ "$manifest_has" != "true" && "$cap_has" != "true" ]]; then
              echo "No storefrontSupport for $zip_file - OK (optional)"
              rm -rf "$tmpdir"
              continue
            fi

            # Asymmetric presence is a mismatch in either direction.
            if [[ "$manifest_has" != "$cap_has" ]]; then
              echo "::error file=$manifest_path::storefrontSupport presence mismatch for $zip_file: manifest=$manifest_has, commerce-app.json=$cap_has"
              rm -rf "$tmpdir"
              exit 1
            fi

            # Reject unknown keys inside storefrontSupport (only sfnext and sfra allowed)
            unknown_keys="$(jq -r '.storefrontSupport | keys[] | select(. != "sfnext" and . != "sfra")' <<< "$entry" 2>/dev/null || true)"
            if [[ -n "$unknown_keys" ]]; then
              echo "::error file=$manifest_path::Unknown keys in storefrontSupport for $zip_file: $unknown_keys"
              rm -rf "$tmpdir"
              exit 1
            fi

            # Reject unknown sub-keys inside sfnext / sfra (only minVersion and maxVersion allowed)
            # and validate semver for any present min/max values.
            for storefront in sfnext sfra; do
              if [[ "$(jq -r --arg s "$storefront" '.storefrontSupport | has($s)' <<< "$entry")" == "true" ]]; then
                bad_subkeys="$(jq -r --arg s "$storefront" '.storefrontSupport[$s] | keys[] | select(. != "minVersion" and . != "maxVersion")' <<< "$entry" 2>/dev/null || true)"
                if [[ -n "$bad_subkeys" ]]; then
                  echo "::error file=$manifest_path::Unknown keys in storefrontSupport.$storefront for $zip_file: $bad_subkeys"
                  rm -rf "$tmpdir"
                  exit 1
                fi
              fi
              for field in minVersion maxVersion; do
                val="$(jq -r --arg s "$storefront" --arg f "$field" '.storefrontSupport[$s][$f] // empty' <<< "$entry")"
                if [[ -n "$val" ]]; then
                  validate_semver "$val" "storefrontSupport.$storefront.$field" "$manifest_path"
                  echo "  ✓ $storefront.$field=$val (valid semver)"
                fi
              done
            done

            # Cross-validate every storefrontSupport min/max value between manifest and commerce-app.json.
            for storefront in sfnext sfra; do
              for field in minVersion maxVersion; do
                cap_val="$(jq -r --arg s "$storefront" --arg f "$field" '.storefrontSupport[$s][$f] // empty' "$commerce_app")"
                manifest_val="$(jq -r --arg s "$storefront" --arg f "$field" '.storefrontSupport[$s][$f] // empty' <<< "$entry")"

                if [[ "$cap_val" != "$manifest_val" ]]; then
                  echo "::error file=$manifest_path::storefrontSupport.$storefront.$field mismatch for $zip_file: manifest='$manifest_val', commerce-app.json='$cap_val'"
                  rm -rf "$tmpdir"
                  exit 1
                fi
              done
            done

            rm -rf "$tmpdir"
            echo "SUCCESS - storefrontSupport validated for $zip_file"
          done < changed_zips.txt

      - name: Step 9 - Validate app-configuration/translations/
        shell: bash
        run: |
          set -euo pipefail

          [[ -s changed_zips.txt ]] || exit 0

          while IFS= read -r zip_path; do
            [[ -f "$zip_path" ]] || continue

            tmpdir="$(mktemp -d)"
            unzip -q "$zip_path" -d "$tmpdir"

            root="$(find "$tmpdir" -mindepth 1 -maxdepth 1 -type d -not -name '__MACOSX' -print -quit)"

            # See .github/scripts/validate-translations.sh for schema.
            if ! translations_output="$(bash ".github/scripts/validate-translations.sh" "$root" 2>&1)"; then
              echo "::error file=$zip_path::app-configuration/translations/ validation failed:"
              printf '%s\n' "$translations_output"
              rm -rf "$tmpdir"
              exit 1
            fi
            echo "  ✓ $translations_output"

            rm -rf "$tmpdir"
          done < changed_zips.txt

